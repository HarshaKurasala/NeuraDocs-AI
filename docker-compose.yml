version: '3.9'

# ── Docker Compose: orchestrates frontend + backend ───────────────────────────
# Usage:
#   docker-compose up --build          # start everything
#   docker-compose up --build backend  # start only backend
#   docker-compose down -v             # stop and remove volumes

services:

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - UPLOAD_DIR=/app/uploads
      - VECTORSTORE_DIR=/app/vectorstore
    volumes:
      # Persist uploads and vector index across container restarts
      - uploads_data:/app/uploads
      - vectorstore_data:/app/vectorstore
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── React Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000/api/v1
    container_name: rag-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

# ── Named volumes for data persistence ───────────────────────────────────────
volumes:
  uploads_data:
  vectorstore_data:
